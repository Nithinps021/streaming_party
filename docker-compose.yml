version: '3.8'

services:
  backend:
    build:
      context: ./backend
    ports:
      - "127.0.0.1:8000:8000" # Binds only to the VM's localhost
    extra_hosts:
      - "host.docker.internal:host-gateway"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=redis://host.docker.internal:6379 # Points to host machine's Redis
    restart: always

  frontend:
    build: 
      context: ./frontend
    ports:
      - "127.0.0.1:3000:80" # Binds VM's localhost:3000 to container's Nginx port 80
    depends_on:
      - backend
    restart: always
